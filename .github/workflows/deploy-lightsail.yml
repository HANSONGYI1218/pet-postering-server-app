name: Deploy to AWS Lightsail Containers

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      LIGHTSAIL_SERVICE_NAME: ${{ secrets.LIGHTSAIL_SERVICE_NAME }}
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      RUN_MIGRATION_IN_CI: ${{ vars.RUN_MIGRATION_IN_CI }}
      # Debug/boot toggles (set in GitHub Actions → Variables)
      SKIP_MIGRATE: ${{ vars.SKIP_MIGRATE }}
      ENTRYPOINT_DEBUG: ${{ vars.ENTRYPOINT_DEBUG }}
      ENTRYPOINT_SLEEP: ${{ vars.ENTRYPOINT_SLEEP }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      JWT_ACCESS_EXPIRES_IN: ${{ secrets.JWT_ACCESS_EXPIRES_IN }}
      JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN }}
      KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      KAKAO_REDIRECT_URI: ${{ secrets.KAKAO_REDIRECT_URI }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Service name (lowercase)
        id: svc
        run: |
          NAME="$LIGHTSAIL_SERVICE_NAME"
          NAME_LC=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
          echo "value=$NAME_LC" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-lightsail

      - name: Configure AWS credentials (Access Keys fallback)
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure Lightsail Container Service
        run: |
          SVC="${{ steps.svc.outputs.value }}"
          echo "Using service: $SVC"
          if ! aws lightsail get-container-services --service-name "$SVC" --query 'containerServices[0].serviceName' --output text >/dev/null 2>&1; then
            echo "Service not found. Creating $SVC (power=nano, scale=1)"
            aws lightsail create-container-service --service-name "$SVC" --power nano --scale 1
            echo "Created. Waiting a few seconds..."
            sleep 5
          else
            echo "Service exists."
          fi

      - name: Setup Node and enable npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (dev included)
        run: npm ci --include=dev

      - name: Prisma migrate deploy (pre-deploy, optional)
        if: ${{ env.RUN_MIGRATION_IN_CI == 'true' }}
        run: |
          set -e
          add_sslmode_require() {
            IN="$1"
            if echo "$IN" | grep -qi 'sslmode='; then
              echo "$IN"
            else
              if echo "$IN" | grep -q '?'; then
                echo "${IN}&sslmode=require"
              else
                echo "${IN}?sslmode=require"
              fi
            fi
          }

          URL="${DIRECT_DATABASE_URL:-${DATABASE_URL}}"
          if [ -z "$URL" ]; then
            echo "No DIRECT_DATABASE_URL or DATABASE_URL provided; cannot run migrations." >&2
            exit 1
          fi
          URL=$(add_sslmode_require "$URL")
          export DATABASE_URL="$URL"
          export DIRECT_DATABASE_URL="$URL"
          echo "Running prisma migrate against: $(echo "$URL" | sed -E 's#://[^@]+@#://***:***@#')"
          # Quick TCP check to surface DNS/egress issues early
          HOST=$(echo "$URL" | sed -E 's#^.+://[^@]+@([^:/?]+).*$#\1#')
          PORT=$(echo "$URL" | sed -n 's#^.*://[^@]*@[^:/?]*:\([0-9][0-9]*\).*$#\1#p')
          [ -z "$PORT" ] && PORT=5432
          echo "Probing $HOST:$PORT"
          (timeout 5 bash -c "</dev/tcp/$HOST/$PORT") || echo "WARN: TCP probe failed (may still succeed with SSL)"
          npx prisma migrate deploy

      - name: Install lightsailctl and jq
        run: |
          sudo curl -sSL https://lightsail-downloads.s3.amazonaws.com/amazon-lightsail-ctl/latest/linux-amd64/lightsailctl -o /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Build image with cache (Buildx)
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: pet-server:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image to Lightsail container registry
        env:
          AWS_PAGER: ""
        run: |
          IMAGE_JSON=$(aws lightsail push-container-image \
            --service-name ${{ steps.svc.outputs.value }} \
            --label pet-server \
            --image pet-server:latest \
            --output json)
          echo "$IMAGE_JSON"

      - name: Create deployment spec
        run: |
          IMAGE_URI='${{ steps.svc.outputs.value }}:pet-server'
          cat > containers.json <<JSON
          {
            "pet-server": {
              "image": "${IMAGE_URI}",
              "ports": {"3000": "HTTP"},
              "environment": {
                "NODE_ENV": "production",
                "PORT": "3000",
                "DATABASE_URL": "${DATABASE_URL}",
                "DIRECT_DATABASE_URL": "${DIRECT_DATABASE_URL}",
                "JWT_ACCESS_SECRET": "${JWT_ACCESS_SECRET}",
                "JWT_REFRESH_SECRET": "${JWT_REFRESH_SECRET}",
                "JWT_ACCESS_EXPIRES_IN": "${JWT_ACCESS_EXPIRES_IN}",
                "JWT_REFRESH_EXPIRES_IN": "${JWT_REFRESH_EXPIRES_IN}",
                "KAKAO_CLIENT_ID": "${KAKAO_CLIENT_ID}",
                "KAKAO_CLIENT_SECRET": "${KAKAO_CLIENT_SECRET}",
                "KAKAO_REDIRECT_URI": "${KAKAO_REDIRECT_URI}",
                "SKIP_MIGRATE": "${SKIP_MIGRATE}",
                "ENTRYPOINT_DEBUG": "${ENTRYPOINT_DEBUG}",
                "ENTRYPOINT_SLEEP": "${ENTRYPOINT_SLEEP}"
              }
            }
          }
          JSON

          cat > endpoint.json <<JSON
          {
            "containerName": "pet-server",
            "containerPort": 3000,
            "healthCheck": {
              "path": "/",
              "intervalSeconds": 20,
              "timeoutSeconds": 10,
              "healthyThreshold": 2,
              "unhealthyThreshold": 10
            }
          }
          JSON

      - name: Deploy to Lightsail Container Service
        run: |
          aws lightsail create-container-service-deployment \
            --service-name ${{ steps.svc.outputs.value }} \
            --containers file://containers.json \
            --public-endpoint file://endpoint.json
